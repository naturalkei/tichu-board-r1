<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/tichu-board-r1/favicon.svg" />
    <meta
      name="description"
      content="TichuBoard is a mobile-first Tichu score tracker with local persistence, bilingual support, and fast round entry."
    />
    <meta name="theme-color" content="#0b1323" />
    <meta property="og:title" content="TichuBoard" />
    <meta
      property="og:description"
      content="A mobile-first Tichu score tracker built for real gameplay at the table."
    />
    <meta property="og:type" content="website" />
    <title>TichuBoard</title>
    <script>
      ;(() => {
        const current = new URL(window.location.href)
        const routePath = current.searchParams.get('p')

        if (!routePath) {
          return
        }

        const basePath = '%BASE_URL%'
        const nextPath = routePath.replace(/^\/+/, '')
        const nextUrl = new URL(`${basePath}${nextPath}`, current.origin)
        const redirectedSearch = current.searchParams.get('q')
        const redirectedHash = current.searchParams.get('h')

        if (redirectedSearch) {
          nextUrl.search = `?${redirectedSearch}`
        }

        if (redirectedHash) {
          nextUrl.hash = redirectedHash
        }

        window.history.replaceState(null, '', nextUrl.toString())
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
