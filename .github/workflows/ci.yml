name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Start preview server
        run: pnpm preview --host 127.0.0.1 --port 4173 &

      - name: Wait for preview server
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/tichu-board-r1/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Stagehand smoke test
        run: pnpm smoke
