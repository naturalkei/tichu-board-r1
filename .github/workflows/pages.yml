name: Deploy Pages

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test source
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Add Pages marker
        run: touch dist/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist

  validate:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Start preview server from build artifact
        run: pnpm preview --host 127.0.0.1 --port 4173 &

      - name: Wait for preview server
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/tichu-board-r1/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Smoke test built artifact
        run: pnpm smoke

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
